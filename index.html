<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Église Nouvelle Alliance</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MENU -->
<header class="header">
    <h1>⛪ Nouvelle Alliance</h1>
    <button id="menu-btn">☰</button>
</header>

<nav id="menu" class="menu">
    <a href="#" onclick="showPage('home')">Accueil</a>
    <a href="#" onclick="showPage('programmes')">Programmes</a>
    <a href="#" onclick="showPage('live')">Live</a>
    <a href="#" onclick="showPage('priere')">Prière</a>
</nav>

<!-- CONTENU -->
<main>

<section id="home" class="page active">
    <h2>Bienvenue 🙏</h2>
    <p>Une église connectée pour tous.</p>
</section>

<section id="programmes" class="page">
    <h2>📅 Programmes</h2>
    <ul>
        <li>Dimanche - Culte 9h</li>
        <li>Mercredi - Étude biblique</li>
        <li>Vendredi - Prière</li>
    </ul>
</section>

<section id="live" class="page">
    <h2>🔴 Culte en direct</h2>
    <iframe width="100%" height="250"
        src="https://www.youtube.com/embed/live_stream?channel=TON_ID_YOUTUBE">
    </iframe>
</section>

<section id="priere" class="page">
    <h2>🙏 Demande de prière</h2>
    <form id="form">
        <input type="text" placeholder="Ton nom" required>
        <textarea placeholder="Ta prière..." required></textarea>
        <button type="submit">Envoyer</button>
    </form>
    <p id="msg"></p>
</section>

</main>

<footer>
    <p>© 2026 Église Nouvelle Alliance</p>
</footer>

<script src="app.js"></script>
</body>
</html>
